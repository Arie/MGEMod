name: Autobuild
# modified from https://github.com/nosoop/NinjaBuild-SMPlugin/blob/master/contrib/github-workflow/build-on-version-tag-push.yml

on:
  push:
    tags:
    - 'v*'

jobs:
  run:
    name: Run action
    runs-on: ubuntu-latest

    # skip build on '[ci skip]'
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup SourcePawn Compiler
      uses: rumblefrog/setup-sp@master
      with:
        version: "1.12.x"

    - name: Compile plugins
      run: |
        pwd
        spcomp -i"./addons/sourcemod/scripting/include/" addons/sourcemod/scripting/mge.sp -o ./addons/sourcemod/plugins/mge.smx
        ls -la

    - name: Download maps that are too large to put on github
      run: |
        cd maps
        wget "https://sappho.io/files/tf/maps/mge_chillypunch_final4_fix2.bsp" || exit 1
        echo "eae52bc16d6cb872938e67b4fc9b845c9f227e5d444614254465fe6530480a0e mge_chillypunch_final4_fix2.bsp" | sha256sum -c || exit 2


    - name: Zip packages
      run: |
        mkdir build
        7za a -r build/mge.zip addons/ maps/
        ls -la
        pwd

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ./build/mge.zip
        fail_on_unmatched_files: true
        generate_release_notes: true
        # if: contains(github.ref, 'beta')
        # prerelease: true

    - name: Trigger server-infra image rebuild
      if: startsWith(github.ref, 'refs/tags/')
      env:
        ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
      run: |
        echo "Triggering docker-publish.yml rebuild in mgetf/server-infra..."
        response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $ACTIONS_PAT" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/mgetf/server-infra/actions/workflows/docker-publish.yml/dispatches" \
          -d '{"ref":"main"}')
        echo "Response code: $response"
        if [[ "$response" -lt 200 || "$response" -ge 300 ]]; then
          echo "::error::Failed to trigger docker-publish.yml (HTTP $response)"
          exit 1
        fi
        echo "docker-publish.yml triggered successfully."
