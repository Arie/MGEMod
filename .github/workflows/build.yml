name: Autobuild

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.1.0-beta18-fb1)'
        required: true
        type: string

jobs:
  run:
    name: Build and release
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
    - uses: actions/checkout@v4

    - name: Setup SourcePawn Compiler
      uses: rumblefrog/setup-sp@master
      with:
        version: "1.12.x"

    - name: Compile plugin
      run: |
        spcomp -i"./addons/sourcemod/scripting/include/" \
               addons/sourcemod/scripting/mge.sp \
               -o ./addons/sourcemod/plugins/mge.smx

    - name: Zip package
      run: |
        mkdir build
        7za a -r build/mge.zip \
          addons/sourcemod/configs \
          addons/sourcemod/plugins \
          addons/sourcemod/translations

    - name: Create tag (workflow_dispatch only)
      if: github.event_name == 'workflow_dispatch'
      env:
        TAG: ${{ inputs.tag }}
      run: |
        git tag "$TAG"
        git push origin "$TAG"

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        files: ./build/mge.zip
        fail_on_unmatched_files: true
        generate_release_notes: true
        prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'beta') }}
